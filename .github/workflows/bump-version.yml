name: Bump version & release (reusable)

on:
  workflow_call:
    inputs:
      rev:
        required: false
        type: string
      title:
        required: false
        type: string
      notes:
        required: false
        type: string
      source_repo:
        required: false
        type: string
        description: "Source code 레포 (예: klausjg/taskflow-source). 지정 시 git log 기반 AI 패치노트 자동 생성."
    secrets:
      RELEASE_PAT:
        required: true

permissions:
  contents: write
  models: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # NEW: source repo의 git log + diff를 모아 AI 입력 준비
      #
      # 비교 기준(BASE) 결정 우선순위:
      #   1) source 레포 자신의 rev-* 태그 중 최신 (이전 릴리즈 때 역방향으로 찍어둔 것)
      #   2) 직전 PWA release 날짜 이전 마지막 commit (1번이 없는 첫 도입 시 fallback)
      #   3) 최근 30 커밋 시작점 (둘 다 없는 정말 첫 release일 때)
      #
      # 이전 버그: PWA 레포의 rev-N 태그를 source 레포에서 찾으려 해서 매번 못 찾고
      #          최근 30 커밋을 통째로 입력 → 매 릴리즈가 같은 커밋들 반복 요약.
      # ─────────────────────────────────────────────
      - name: Collect source changes for AI
        if: inputs.source_repo != ''
        id: collect
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          PAT: ${{ secrets.RELEASE_PAT }}
        shell: bash
        run: |
          set -e

          # 직전 PWA release 시각 — source에 rev-* 태그가 아직 없을 때의 fallback
          # version.json 에는 releaseDate(YYYY-MM-DD) + releaseTime(HH:MM, KST) 가 들어있음
          PREV_TS=""
          if [ -f version.json ]; then
            PREV_DATE=$(python3 -c "import json,sys;d=json.load(open('version.json'));print(d.get('releaseDate','') or '')" 2>/dev/null || echo "")
            PREV_TIME=$(python3 -c "import json,sys;d=json.load(open('version.json'));print(d.get('releaseTime','') or '')" 2>/dev/null || echo "")
            if [ -n "$PREV_DATE" ] && [ -n "$PREV_TIME" ]; then
              PREV_TS="${PREV_DATE} ${PREV_TIME}:59 +0900"   # KST
            elif [ -n "$PREV_DATE" ]; then
              PREV_TS="${PREV_DATE} 23:59:59 +0900"
            fi
          fi
          echo "직전 PWA release 시각: ${PREV_TS:-(없음)}"

          # source 레포 clone
          rm -rf /tmp/source-checkout
          git clone "https://x-access-token:${PAT}@github.com/${SOURCE_REPO}.git" /tmp/source-checkout
          cd /tmp/source-checkout
          git fetch --tags --quiet

          HEAD_COMMIT=$(git rev-parse HEAD)
          # 다음 step에서 source에 rev-N 태그를 찍을 SHA로 사용
          echo "$HEAD_COMMIT" > /tmp/source_head.txt

          # 1) source 레포 자신의 rev-* 태그 우선
          SRC_LAST_TAG=$(git tag --list 'rev-*' --sort=-v:refname | head -n 1 || true)
          if [ -n "$SRC_LAST_TAG" ]; then
            BASE_COMMIT=$(git rev-parse "$SRC_LAST_TAG")
            echo "비교 기준: source 레포 ${SRC_LAST_TAG} (${BASE_COMMIT})"
          # 2) 직전 PWA release 시각 이전 마지막 commit (첫 도입용 fallback)
          elif [ -n "$PREV_TS" ]; then
            BASE_COMMIT=$(git log --before="${PREV_TS}" -1 --pretty=format:"%H" HEAD || echo "")
            if [ -z "$BASE_COMMIT" ]; then
              BASE_COMMIT=$(git rev-list --max-count=30 HEAD | tail -1)
              echo "비교 기준: PREV_TS 이전 commit 없음 → 최근 30 커밋 시작점 ($BASE_COMMIT)"
            else
              echo "비교 기준: PREV_TS(${PREV_TS}) 이전 마지막 commit ($BASE_COMMIT)"
            fi
          # 3) 정말 첫 release
          else
            BASE_COMMIT=$(git rev-list --max-count=30 HEAD | tail -1)
            echo "비교 기준: 최근 30 커밋 시작점 ($BASE_COMMIT)"
          fi

          # BASE_COMMIT == HEAD 이면 변경 없음
          if [ "$BASE_COMMIT" = "$HEAD_COMMIT" ]; then
            echo "변경된 commit이 없음. 빈 입력으로 진행."
            : > /tmp/ai_input.txt
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "===== Commit log (${BASE_COMMIT:0:7}..${HEAD_COMMIT:0:7}) ====="
            git log "${BASE_COMMIT}..HEAD" --pretty=format:"- %s%n%b" --no-merges
            echo ""
            echo ""
            echo "===== Files changed (stat) ====="
            git diff --stat "${BASE_COMMIT}..HEAD"
            echo ""
            echo "===== Sample diff (truncated) ====="
            git diff "${BASE_COMMIT}..HEAD" | head -c 30000 || true
          } > /tmp/source_changes.txt

          # AI 토큰 한도 — gpt-4o-mini는 128K context (~500KB). 50KB는 안전선.
          head -c 50000 /tmp/source_changes.txt > /tmp/ai_input.txt
          echo "──── AI 입력 미리보기 ────"
          cat /tmp/ai_input.txt
          echo "──────────────────────────"

      - name: Generate release notes via GitHub Models
        if: inputs.source_repo != ''
        id: ai_notes
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          system-prompt: |
            너는 일반 사용자(개발자 아님)에게 "이번 업데이트에서 뭐가 달라졌는지" 알려주는
            한국어 릴리즈 노트 작성기다.

            # 너의 독자
            - 이 앱의 화면만 본다. 코드/파일/스크립트/배포/CI 같은 건 모른다.
            - "어떻게 쓰는지"가 어떻게 바뀌었는지 궁금해한다.

            # 입력에서 절대 본문에 등장시키지 말 것 (있어도 무시)
            - 파일 이름이나 경로 자체:
              CLAUDE.md, README.md, .vscode/, .clasp*, .gitignore, .claspignore,
              scripts/, .github/workflows/, version.json, package.json,
              RELEASE_NOTES.md, LICENSE
            - 개발 도구·환경 자체:
              VSCode, clasp, GitHub Actions, GitHub Models, workflow, CI,
              lint, 빌드, 배포 스크립트, 푸시, 동기화 자동화 작업, deploy
            - 코드 위생:
              주석, 포맷, 들여쓰기, 변수명, 리팩터링, 함수 분리, 코드 정리
            - 추상 시스템 용어:
              API, refactor, deprecation, dependency, migration, hotfix

            # 본문에 살릴 것
            - 사용자가 화면에서 마주칠 수 있는 변화:
              새 버튼 / 새 화면 / 새 메뉴 / 색·배치 변화 / 팝업·알림 동작 /
              입력 방식 / 자동 계산·표시 항목 / 단축 동작 / 상태 표시
            - 체감되는 속도·안정성 개선
            - 사용자가 직접 겪었던 버그의 수정

            # 추출 규칙
            - 입력 commit log·diff 중 사용자 시점 변화 1~3개를 골라라.
              나머지는 자른다. 모든 commit을 다 적으려 하지 마라.
            - commit 메시지가 무미건조해도("Update index.html" 등)
              diff에서 새 버튼·새 동작이 보이면 사용자 시점으로 풀어 써라.
            - 사용자가 알아챌 변화가 정말로 하나도 없으면,
              본문 4개 섹션은 "- " 한 줄만 두고 "📝 기타"에
              "내부 정리 작업이 진행되었어요" 한 줄만 넣어라.
            - 추측·과장 금지. 입력에 없는 기능을 만들어내지 마라.

            # 표현 규칙
            - 사용자 시점 한 줄. "~되었습니다"보단 "~했어요 / ~쓸 수 있어요 /
              ~한눈에 보여요" 같은 부드러운 어미.
            - "~기능이 구현되었습니다" 같은 개발자 어투 금지.
              "~할 수 있게 됐어요" 처럼 사용자가 무엇을 할 수 있게 됐는지로.

            # 출력 형식 (이것 외에 아무것도 출력하지 마라)
            ## 🎉 이번 릴리즈 요약
            - (한 줄로 핵심 변화. "이번 업데이트에서 ~ 할 수 있게 됐어요" 형태)

            ## ✨ 추가된 기능
            -

            ## 🔧 변경/개선
            -

            ## 🐛 수정된 문제
            -

            ## 📝 기타
            -

            변경 내용이 없는 섹션은 "- " 한 줄만 비워두기.
            절대 인사말, 설명, 코드 펜스(```)를 추가하지 마라.
          prompt-file: /tmp/ai_input.txt

      - name: Save AI output to RELEASE_NOTES.md
        if: inputs.source_repo != '' && steps.ai_notes.outputs.response != ''
        env:
          AI_OUTPUT: ${{ steps.ai_notes.outputs.response }}
        shell: bash
        run: |
          # 코드 펜스가 들어있으면 제거
          printf '%s' "$AI_OUTPUT" \
            | sed -e '/^```[a-zA-Z]*$/d' -e '/^```$/d' \
            > RELEASE_NOTES.md
          echo "──── AI 작성 RELEASE_NOTES.md ────"
          cat RELEASE_NOTES.md
          echo "──────────────────────────────────"

      # ─────────────────────────────────────────────
      # 기존 단계 (변경 없음)
      # ─────────────────────────────────────────────
      - name: Prepare release notes
        id: notes
        env:
          INPUT_NOTES: ${{ inputs.notes }}
        shell: bash
        run: |
          set -e
          if [ -n "$INPUT_NOTES" ]; then
            printf '%s' "$INPUT_NOTES" > /tmp/release_notes.md
            echo "source=input" >> "$GITHUB_OUTPUT"
          elif [ -f RELEASE_NOTES.md ] && [ -s RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md /tmp/release_notes.md
            echo "source=file" >> "$GITHUB_OUTPUT"
          else
            printf '' > /tmp/release_notes.md
            echo "source=empty" >> "$GITHUB_OUTPUT"
          fi
          echo "----- release notes preview -----"
          cat /tmp/release_notes.md
          echo "---------------------------------"

      - name: Resolve release title
        id: title
        env:
          INPUT_TITLE: ${{ inputs.title }}
        shell: bash
        run: |
          set -e
          if [ -n "$INPUT_TITLE" ]; then
            FINAL_TITLE="$INPUT_TITLE"
          elif [ -f RELEASE_NOTES.md ]; then
            FINAL_TITLE=$(awk '
              /^##[[:space:]]+🎉[[:space:]]*이번[[:space:]]*릴리즈[[:space:]]*요약/ {found=1; next}
              found && /^##[[:space:]]/ {found=0}
              found && /^-[[:space:]]*/ {
                sub(/^-[[:space:]]*/, "")
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (length($0) > 0) { print; exit }
              }
            ' RELEASE_NOTES.md)
          fi
          if [ -z "$FINAL_TITLE" ]; then
            echo "❌ title이 비어있고 RELEASE_NOTES.md의 '이번 릴리즈 요약'에서도 제목을 찾지 못했습니다."
            exit 1
          fi
          echo "resolved title: $FINAL_TITLE"
          echo "value=$FINAL_TITLE" >> "$GITHUB_OUTPUT"

      - name: Update version.json
        id: bump
        env:
          INPUT_REV: ${{ inputs.rev }}
          INPUT_TITLE: ${{ steps.title.outputs.value }}
        shell: bash
        run: |
          set -e
          CUR=$(python3 -c "import json;print(json.load(open('version.json'))['rev'])")
          if [ -z "$INPUT_REV" ]; then
            NEW=$((CUR + 1))
          else
            NEW="$INPUT_REV"
          fi
          export NEW_REV="$NEW"
          export DATE="$(TZ=Asia/Seoul date +%Y-%m-%d)"
          export TIME="$(TZ=Asia/Seoul date +%H:%M)"
          python3 - <<'PY'
          import json, os
          p = 'version.json'
          d = json.load(open(p, encoding='utf-8'))
          d['rev'] = int(os.environ['NEW_REV'])
          d['releaseDate'] = os.environ['DATE']
          d['releaseTime'] = os.environ['TIME']
          d['title'] = os.environ['INPUT_TITLE']
          notes = open('/tmp/release_notes.md', encoding='utf-8').read().strip()
          if notes:
            d['notes'] = notes
          json.dump(d, open(p, 'w', encoding='utf-8'),
            ensure_ascii=False, indent=2)
          open(p, 'a', encoding='utf-8').write('\n')
          PY
          echo "new_rev=$NEW" >> "$GITHUB_OUTPUT"

      - name: Reset RELEASE_NOTES.md to template
        if: steps.notes.outputs.source == 'file'
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## 🎉 이번 릴리즈 요약
          -
          ## ✨ 추가된 기능
          -
          ## 🔧 변경/개선
          -
          ## 🐛 수정된 문제
          -
          ## 📝 기타
          -
          EOF

      - name: Commit & tag
        env:
          NEW_REV: ${{ steps.bump.outputs.new_rev }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json RELEASE_NOTES.md 2>/dev/null || git add version.json
          git commit -m "chore: bump to rev-$NEW_REV"
          git tag "rev-$NEW_REV"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          NEW_REV: ${{ steps.bump.outputs.new_rev }}
          TITLE: ${{ steps.title.outputs.value }}
        run: |
          gh release create "rev-$NEW_REV" \
            --title "Rev. $NEW_REV - $TITLE" \
            --notes-file /tmp/release_notes.md

      # ─────────────────────────────────────────────
      # NEW: source 레포에도 rev-N 태그를 역방향 push
      # 다음 릴리즈가 정확히 "지난 rev 이후 commit"만 AI 입력으로 보게 만드는 핵심 단계.
      # ─────────────────────────────────────────────
      - name: Tag source repo with rev-N
        if: inputs.source_repo != ''
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          PAT: ${{ secrets.RELEASE_PAT }}
          NEW_REV: ${{ steps.bump.outputs.new_rev }}
        shell: bash
        run: |
          set -e
          if [ ! -d /tmp/source-checkout ]; then
            echo "ℹ️  /tmp/source-checkout 없음 — Collect step이 스킵됐을 가능성. 태그도 스킵."
            exit 0
          fi
          SRC_HEAD=$(cat /tmp/source_head.txt 2>/dev/null || echo "")
          if [ -z "$SRC_HEAD" ]; then
            echo "ℹ️  source HEAD SHA 없음. 태그 스킵."
            exit 0
          fi

          cd /tmp/source-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 이미 같은 이름의 태그가 remote에 있으면 멱등 처리
          if git ls-remote --tags origin "rev-$NEW_REV" | grep -q "refs/tags/rev-$NEW_REV"; then
            echo "ℹ️  source 레포에 rev-$NEW_REV 가 이미 있음. 스킵."
            exit 0
          fi

          git tag "rev-$NEW_REV" "$SRC_HEAD"
          git push origin "rev-$NEW_REV"
          echo "✅ source 레포에 rev-$NEW_REV 태그 push 완료 ($SRC_HEAD)"
